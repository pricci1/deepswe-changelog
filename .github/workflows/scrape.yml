name: Scrape DeepSWE benchmark results

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Scrape published artifacts
        run: bun run scrape

      - name: Commit changes
        run: |
          if [ -z "$(git status --porcelain -- README.md data)" ]; then
            echo "No DeepSWE benchmark changes detected."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md data
          git commit -m "Update DeepSWE benchmark results"
          git push
